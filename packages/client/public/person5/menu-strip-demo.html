<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PERSON5 Menu Strip Demo</title>
  <style>
    :root {
      --p5-red: #d6001c;
      --p5-black: #050505;
      --p5-white: #f6f1e6;
      --p5-line: #fff8ec;
      --p5-gray: #a8a39a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 20%, rgba(214, 0, 28, 0.18), transparent 34%),
        repeating-linear-gradient(45deg, transparent 0 34px, rgba(255, 255, 255, 0.035) 35px 37px, transparent 38px 72px),
        #050505;
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    .demo-stage {
      width: min(920px, 94vw);
      padding: 54px 42px;
      background:
        linear-gradient(112deg, rgba(0, 0, 0, 0.96), rgba(42, 0, 7, 0.82)),
        radial-gradient(circle, rgba(255, 255, 255, 0.14) 1px, transparent 1.5px);
      background-size: auto, 14px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .p5-strip {
      position: relative;
      width: 760px;
      max-width: 100%;
      height: 150px;
      margin-left: 84px;
      filter: drop-shadow(13px 12px 0 rgba(0, 0, 0, 0.95));
    }

    .p5-strip::before,
    .p5-strip::after,
    .p5-strip-core {
      position: absolute;
      inset: 0;
      content: "";
      clip-path: polygon(0 50%, 42px 0, 100% 0, 96.5% 100%, 42px 100%);
      transform: skewX(-4deg);
      transform-origin: left center;
    }

    .p5-strip::before {
      background: var(--p5-line);
      inset: 0;
      z-index: 1;
    }

    .p5-strip::after {
      background: var(--p5-black);
      inset: 7px 8px 7px 8px;
      z-index: 2;
    }

    .p5-strip-core {
      inset: 14px 18px 14px 18px;
      z-index: 3;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.06), transparent 18%),
        var(--p5-black);
      outline: 3px solid var(--p5-line);
      outline-offset: -8px;
    }

    .p5-notch-stars {
      position: absolute;
      left: -78px;
      top: 20px;
      z-index: 6;
      width: 112px;
      height: 96px;
      pointer-events: none;
    }

    .p5-star {
      position: absolute;
      width: var(--size);
      height: var(--size);
      clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 56%, 79% 91%, 50% 70%, 21% 91%, 32% 56%, 2% 35%, 39% 35%);
      transform: rotate(var(--rot));
    }

    .p5-star::before {
      position: absolute;
      inset: var(--stroke);
      content: "";
      clip-path: inherit;
      background: var(--fill);
    }

    .p5-star-red-large {
      --size: 52px;
      --rot: -12deg;
      --stroke: 5px;
      --fill: var(--p5-red);
      left: 8px;
      top: 16px;
      background: var(--p5-line);
    }

    .p5-star-white-large {
      --size: 46px;
      --rot: 22deg;
      --stroke: 5px;
      --fill: var(--p5-white);
      left: 48px;
      top: 28px;
      background: var(--p5-black);
      filter: drop-shadow(2px 2px 0 var(--p5-line));
    }

    .p5-star-red-small {
      --size: 18px;
      --rot: -26deg;
      --stroke: 0;
      --fill: var(--p5-red);
      left: 3px;
      top: 66px;
      background: var(--p5-red);
    }

    .p5-star-white-small {
      --size: 18px;
      --rot: 15deg;
      --stroke: 3px;
      --fill: var(--p5-white);
      left: 68px;
      top: 4px;
      background: var(--p5-black);
    }

    .p5-z-line,
    .p5-seven-line {
      position: absolute;
      z-index: 5;
      pointer-events: none;
    }

    .p5-z-line {
      left: 78px;
      bottom: 28px;
      width: 300px;
      height: 38px;
    }

    .p5-seven-line {
      right: 76px;
      top: 26px;
      width: 140px;
      height: 40px;
    }

    .p5-copy {
      position: absolute;
      left: 230px;
      top: 28px;
      z-index: 7;
      transform: rotate(-2deg);
      color: var(--p5-white);
    }

    .p5-title {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .p5-char {
      min-width: 44px;
      height: 58px;
      display: grid;
      place-items: center;
      padding: 0 8px 5px;
      color: var(--p5-white);
      background: var(--p5-black);
      border: 3px solid var(--p5-white);
      box-shadow: 4px 4px 0 var(--p5-black), -2px -2px 0 rgba(255, 255, 255, 0.5);
      font-size: 38px;
      font-weight: 950;
      line-height: 1;
      text-shadow:
        3px 0 0 var(--p5-black),
        -3px 0 0 var(--p5-black),
        0 3px 0 var(--p5-black),
        0 -3px 0 var(--p5-black);
      transform: skewX(-8deg);
    }

    .p5-char.hot {
      background: var(--p5-red);
      box-shadow: 4px 4px 0 var(--p5-black), -2px -2px 0 var(--p5-white);
    }

    .p5-char.paper {
      color: var(--p5-black);
      background: var(--p5-white);
      text-shadow: none;
    }

    .p5-subtitle {
      position: absolute;
      left: 90px;
      top: 64px;
      padding: 0 14px 3px;
      color: var(--p5-gray);
      background: rgba(0, 0, 0, 0.86);
      border-top: 2px solid rgba(255, 255, 255, 0.7);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 22px;
      font-style: italic;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="demo-stage">
    <section class="p5-strip" aria-label="PERSON5 功能条样式 demo">
      <div class="p5-strip-core"></div>

      <div class="p5-notch-stars" aria-hidden="true">
        <span class="p5-star p5-star-red-large"></span>
        <span class="p5-star p5-star-white-large"></span>
        <span class="p5-star p5-star-red-small"></span>
        <span class="p5-star p5-star-white-small"></span>
      </div>

      <svg class="p5-seven-line" viewBox="0 0 140 40" aria-hidden="true">
        <polyline points="8 10 118 4 132 16" fill="none" stroke="#fff8ec" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter" />
      </svg>

      <svg class="p5-z-line" viewBox="0 0 300 38" aria-hidden="true">
        <polyline points="0 30 112 18 92 30 300 12" fill="none" stroke="#d6001c" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter" />
      </svg>

      <div class="p5-copy">
        <div class="p5-title">
          <span class="p5-char hot">心</span>
          <span class="p5-char paper">之</span>
          <span class="p5-char">怪</span>
          <span class="p5-char">盗</span>
          <span class="p5-char hot">团</span>
        </div>
        <div class="p5-subtitle">成员 / 侧写</div>
      </div>
    </section>
  </main>
</body>
</html>
